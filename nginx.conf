user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    multi_accept on;
    use epoll;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application hls {
            live on;
            hls on;
            hls_path /tmp/hls/;
            hls_fragment 1s;
            hls_playlist_length 3s;
            hls_cleanup on;
            hls_type live;
            hls_fragment_naming system;
            
            # Yayıncı IP kısıtlaması (vMix IP'ni buraya yazabilirsin)
            # allow publish 192.168.x.x;
            # deny publish all;
        }
    }
}

http {
    include mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server {
        listen 80;
        server_name localhost;

        location /hls {
            alias /tmp/hls/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        location / {
            root /var/www/html;
            index index.html;
        }
    }
}
